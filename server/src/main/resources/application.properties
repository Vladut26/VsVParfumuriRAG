spring.application.name=vsv-backend
spring.threads.virtual.enabled=true

# DB
spring.datasource.url=jdbc:${SPRING_DATASOURCE_URL:${DATABASE_URL:postgresql://localhost:5432/vsv_db}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.jackson.default-property-inclusion=NON_NULL
server.port=8080

# JWT
app.jwt.secret=${JWT_SECRET:vsvSuperSecretKeyForJWTTokenGeneration2026!}
app.jwt.expiration-ms=${JWT_EXPIRATION:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION:604800000}

ai.service.base-url=${AI_SERVICE_URL:http://localhost:8000}

stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_}

vsv.email.enabled=true
spring.mail.username=${EMAIL_USERNAME:email}
spring.mail.password=${EMAIL_PASSWORD:pw}